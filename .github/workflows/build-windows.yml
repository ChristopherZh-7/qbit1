name: Build Windows

on:
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: 'Upload build artifact'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  build:
    runs-on: windows-latest
    name: Build (Windows-x86_64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          shared-key: build-Windows-x86_64

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_CONFIG: '{"bundle":{"externalBin":null}}'
        with:
          projectPath: backend/crates/qbit
          tauriScript: pnpm --dir ../../.. tauri
          args: --target x86_64-pc-windows-msvc

      - name: Upload artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: qbit-windows-x86_64
          path: |
            backend/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            backend/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 7
